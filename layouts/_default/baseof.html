<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Params.description | default "ZWISERFIT — 全球实体商业AI基础设施。AI+人类协同共生模式。" }}">
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  {{ hugo.Generator }}
</head>
<body>
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">ZWISERFIT</a>
      <div class="nav-links">
        <a href="#problem">问题</a>
        <a href="#solution">方案</a>
        <a href="#founder">创始人</a>
        <a href="#data">实证</a>
        <a href="#tech">技术</a>
        <a href="#token">Token</a>
        <a href="#fundraising">融资</a>
        <a href="#links">链接</a>
      </div>
      <button class="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>© 2026 ZWISERFIT. 全球实体商业AI基础设施。</p>
      <p class="footer-tagline">AI + 人类协同共生模式</p>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click',()=>{
      document.querySelector('.nav-links').classList.toggle('open')
    })
  </script>
</body>
</html>
